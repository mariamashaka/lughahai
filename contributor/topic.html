<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lugha Hai — Mada</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .lang-switcher { display:flex;align-items:center;background:var(--cream-dark);border-radius:var(--radius-xl);padding:3px;gap:2px; }
    .lang-switcher__btn { padding:4px 12px;border-radius:var(--radius-xl);border:none;background:transparent;font-size:0.8rem;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all var(--transition); }
    .lang-switcher__btn.active { background:var(--white);color:var(--green-deep);box-shadow:0 1px 4px var(--shadow-warm); }

    /* Topic header */
    .topic-header { background:var(--white);border-bottom:1px solid var(--cream-border);padding:var(--space-lg) 0;margin-bottom:var(--space-xl); }
    .topic-header__inner { display:flex;align-items:center;justify-content:space-between;gap:var(--space-lg);flex-wrap:wrap; }
    .topic-header__breadcrumb { font-size:0.78rem;color:var(--text-muted);margin-bottom:var(--space-xs); }
    .topic-header__breadcrumb a { color:var(--text-muted); }
    .topic-header__breadcrumb a:hover { color:var(--green-mid); }
    .topic-header__title { font-size:1.3rem;font-weight:600;color:var(--green-deep); }
    .topic-header__payment {
      display:flex;align-items:center;gap:var(--space-sm);
      background:var(--green-mist);border-radius:var(--radius-xl);
      padding:6px 16px;font-size:0.85rem;color:var(--green-deep);font-weight:500;
    }

    /* Warning block */
    .warning-block {
      background:#fffbf0;border:1px solid var(--gold);border-left:4px solid var(--gold);
      border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl);
    }
    .warning-block__title { font-weight:600;color:#7a5c00;margin-bottom:var(--space-md);font-size:0.95rem; }
    .warning-block__item { display:flex;align-items:flex-start;gap:var(--space-sm);font-size:0.85rem;color:#5a4000;line-height:1.6;margin-bottom:var(--space-sm); }
    .warning-block__item:last-child { margin-bottom:0; }
    .warning-block__icon { flex-shrink:0;margin-top:1px; }

    /* Block section header */
    .block-header {
      font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
      text-transform:uppercase;color:var(--green-deep);
      margin:var(--space-xl) 0 var(--space-md);
      padding-bottom:var(--space-sm);border-bottom:2px solid var(--green-mist);
      display:flex;align-items:center;gap:var(--space-md);
    }
    .block-progress-chip {
      font-size:0.7rem;font-weight:500;padding:2px 10px;
      border-radius:99px;background:var(--cream-dark);color:var(--text-muted);
      text-transform:none;letter-spacing:0;
    }
    .block-progress-chip.done { background:var(--green-mist);color:var(--green-deep); }

    /* Phrase block */
    .phrase-block { background:var(--white);border:1px solid var(--cream-border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--space-md);box-shadow:0 2px 8px var(--shadow-warm); }
    .phrase-block.done { border-color:var(--green-pale); }
    .phrase-header { display:flex;align-items:center;justify-content:space-between;padding:var(--space-md) var(--space-lg);background:var(--cream);border-bottom:1px solid var(--cream-border);cursor:pointer;gap:var(--space-md); }
    .phrase-header:hover { background:var(--cream-dark); }
    .phrase-num { width:28px;height:28px;border-radius:50%;background:var(--green-deep);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;flex-shrink:0; }
    .phrase-num.done { background:var(--green-soft); }
    .phrase-source { flex:1;font-size:0.9rem;color:var(--text-dark);font-weight:500; }
    .phrase-source span { display:block;font-size:0.75rem;color:var(--text-muted);font-weight:400;margin-top:2px; }
    .phrase-chevron { color:var(--text-muted);transition:transform var(--transition);font-size:1rem; }
    .phrase-chevron.open { transform:rotate(90deg); }

    .phrase-body { padding:var(--space-lg);display:none;flex-direction:column;gap:var(--space-lg); }
    .phrase-body.open { display:flex; }

    /* Translation input */
    .field-label { font-size:0.78rem;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--space-sm); }
    .translation-input {
      width:100%;padding:0.75rem 1rem;border:1.5px solid var(--cream-border);
      border-radius:var(--radius-md);background:var(--white);color:var(--text-dark);
      font-size:1rem;outline:none;font-family:var(--font-body);
      transition:border-color var(--transition),box-shadow var(--transition);
    }
    .translation-input:focus { border-color:var(--green-soft);box-shadow:0 0 0 3px rgba(92,140,117,0.15); }
    .translation-input.filled { border-color:var(--green-pale);background:var(--green-mist); }

    /* Audio */
    .audio-controls { display:flex;align-items:center;gap:var(--space-md);padding:var(--space-md) var(--space-lg);background:var(--cream);border-radius:var(--radius-md);border:1px solid var(--cream-border); }
    .rec-btn { width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all var(--transition);flex-shrink:0; }
    .rec-btn--record { background:var(--terracotta);color:var(--white); }
    .rec-btn--record:hover { background:#b05e38;transform:scale(1.05); }
    .rec-btn--record.recording { background:#922b21;animation:pulse 1.2s infinite; }
    .rec-btn--play { background:var(--green-mid);color:var(--white); }
    .rec-btn--play:hover { background:var(--green-deep);transform:scale(1.05); }
    .rec-btn--play:disabled { opacity:0.35;cursor:not-allowed;transform:none; }
    .rec-btn--delete { background:var(--cream-dark);color:var(--text-soft); }
    .rec-btn--delete:hover { background:#fdecea;color:#922b21; }
    .rec-btn--delete:disabled { opacity:0.3;cursor:not-allowed; }
    .audio-status { flex:1;font-size:0.82rem;color:var(--text-soft); }
    .audio-status.has-rec { color:var(--green-mid);font-weight:500; }

    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(146,43,33,0.4);}50%{box-shadow:0 0 0 8px rgba(146,43,33,0);} }

    /* Sidebar */
    .sidebar-card { background:var(--white);border:1px solid var(--cream-border);border-radius:var(--radius-lg);padding:var(--space-lg);box-shadow:0 2px 8px var(--shadow-warm);margin-bottom:var(--space-md); }
    .sidebar-card__title { font-size:0.72rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-md);padding-bottom:var(--space-sm);border-bottom:1px solid var(--cream-border); }
    .mini-check { width:18px;height:18px;border-radius:50%;border:1.5px solid var(--cream-border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;flex-shrink:0;color:transparent; }
    .mini-check.done { background:var(--green-soft);border-color:var(--green-soft);color:var(--white); }

    /* Status badge for topic */
    .status-path { display:flex;flex-wrap:wrap;gap:var(--space-sm);align-items:center;margin-bottom:var(--space-xl); }
    .status-step { font-size:0.78rem;color:var(--text-muted);display:flex;align-items:center;gap:5px; }
    .status-step.current { color:var(--green-deep);font-weight:600; }
    .status-step__dot { width:8px;height:8px;border-radius:50%;background:var(--cream-border); }
    .status-step.current .status-step__dot { background:var(--green-soft); }
    .status-step.done-step .status-step__dot { background:var(--green-pale); }
    .status-arrow { color:var(--text-muted);font-size:0.75rem; }

    /* Loading state */
    .loading { text-align:center;padding:var(--space-2xl);color:var(--text-muted); }

    @media(max-width:900px) {
      .topic-grid { grid-template-columns:1fr !important; }
      .topic-sidebar { position:static !important; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="container">
      <div class="nav__inner">
        <a href="../index.html" class="nav__logo">Lugha <span>Hai</span></a>
        <div class="nav__links">
          <a href="index.html" class="nav__link" data-i18n="nav_dashboard">Dashibodi</a>
        </div>
        <div class="nav__actions">
          <div class="lang-switcher">
            <button class="lang-switcher__btn active" onclick="setLang('sw')" id="btn-sw">SW</button>
            <button class="lang-switcher__btn" onclick="setLang('en')" id="btn-en">EN</button>
          </div>
          <a href="../auth/login.html" class="btn btn--ghost btn--sm" data-i18n="nav_signout">Toka</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- TOPIC HEADER -->
  <div class="topic-header">
    <div class="container">
      <div class="topic-header__inner">
        <div>
          <div class="topic-header__breadcrumb">
            <a href="index.html" data-i18n="nav_dashboard">Dashibodi</a> ›
            <span id="hdr-lang">Kikurya A1</span> ›
            <span id="hdr-type"></span>
          </div>
          <div class="topic-header__title" id="hdr-title">...</div>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-md);flex-wrap:wrap;">
          <div class="topic-header__payment" id="hdr-payment">
            💰 <span id="hdr-payment-amount">5,000 TZS</span>
          </div>
          <button class="btn btn--ghost btn--sm" onclick="saveDraft()" data-i18n="btn_save">Hifadhi</button>
          <button class="btn btn--primary" onclick="submitTopic()" data-i18n="btn_submit">Tuma kwa ukaguzi</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <div class="loading">⏳ <span data-i18n="loading">Inapakia...</span></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer__logo">Lugha Hai</div>
      <p class="footer__tagline" data-i18n="footer_tagline">Lugha hai, zilizohifadhiwa kwa vizazi.</p>
      <div class="footer__bottom">
        <span>© 2026 Lugha Hai.</span>
        <span style="color:var(--green-pale);font-size:0.8rem;">Created by Mariia Rukavishnikova · Built with ♥ in Tanzania</span>
      </div>
    </div>
  </footer>

  <script>
  // ── TRANSLATIONS ──────────────────────────────────────
  const i18n = {
    sw: {
      nav_dashboard:"Dashibodi", nav_signout:"Toka",
      loading:"Inapakia...",
      btn_save:"Hifadhi rasimu", btn_submit:"Tuma kwa ukaguzi",
      type_grammar:"Sarufi", type_vocabulary:"Msamiati",
      warning_title:"⚠️ Muhimu kujua",
      w1:"Malipo yanafanywa baada ya ukaguzi wa msimamizi na uthibitisho wa msimamizi mkuu. Njia ya malipo inakubaliwana kibinafsi.",
      w2:"Mfumo unakokotoa kiotomatiki asilimia ya makosa baada ya ukaguzi na kupunguza kiasi hicho kutoka malipo yako. Jaza kwa makini.",
      w3:"Lahaja si kosa. Ikiwa tofauti na msemaji mwingine ni ya lahaja — utapata malipo kamili. Ikiwa ni kutokana na uzembe wa kujaza — kiasi kitapunguzwa.",
      w4:"Ikiwa makosa yanazidi asilimia 20 — swali la kuendelea kufanya kazi linaenda kwa msimamizi mkuu.",
      w5:"Unaweza kuhifadhi kazi yako wakati wowote na kurudi baadaye.",
      w6:"Ikiwa hukubaliani na matokeo ya ukaguzi — unaweza kupinga. Kesi itaenda kwa msimamizi mkuu.",
      field_translation:"Tafsiri (lugha yako)",
      field_translation_ph:"Andika tafsiri yako hapa...",
      field_audio:"Sauti",
      audio_tip:"Zungumza polepole na wazi",
      audio_saved:"✓ Sauti imehifadhiwa",
      audio_recording:"Inarekodi... bonyeza kusimama",
      btn_done:"Imekamilika ✓",
      btn_undo:"↩ Rudi",
      checklist_title:"Maendeleo",
      label_translations:"Tafsiri",
      label_audio:"Sauti",
      label_done:"Zilizokamilika",
      instructions_title:"Maelekezo",
      instructions_body:"Kwa kila sentensi: (1) Andika tafsiri yako kwa lugha yako ya asili. (2) Rekodi sauti yako ukizungumza sentensi hiyo polepole na wazi. (3) Bonyeza 'Imekamilika' ukimaliza kila sentensi. Unaweza kusimama na kurudi baadaye.",
      status_label:"Hali ya mada",
      status_inprogress:"Inaendelea",
      save_ok:"✓ Imehifadhiwa!",
      submit_ok:"✓ Imetumwa kwa ukaguzi! Asante.",
      submit_incomplete:"Tafadhali kamilisha tafsiri zote kabla ya kutuma.",
      footer_tagline:"Lugha hai, zilizohifadhiwa kwa vizazi."
    },
    en: {
      nav_dashboard:"Dashboard", nav_signout:"Sign out",
      loading:"Loading...",
      btn_save:"Save draft", btn_submit:"Submit for review",
      type_grammar:"Grammar", type_vocabulary:"Vocabulary",
      warning_title:"⚠️ Important to know",
      w1:"Payment is made after moderator review and admin confirmation. Payment method is agreed individually.",
      w2:"The system automatically calculates the error percentage after review and deducts that amount from your payment. Fill in carefully.",
      w3:"Dialects are not errors. If a difference from another speaker is due to dialect — you will receive full payment. If it is due to careless entry — the amount will be reduced.",
      w4:"If errors exceed 20% — the question of continuing work is referred to the admin.",
      w5:"You can save your work at any time and come back later.",
      w6:"If you disagree with the review result — you can dispute it. The case will go to the admin.",
      field_translation:"Translation (your language)",
      field_translation_ph:"Type your translation here...",
      field_audio:"Audio",
      audio_tip:"Speak slowly and clearly",
      audio_saved:"✓ Audio saved",
      audio_recording:"Recording... click to stop",
      btn_done:"Mark done ✓",
      btn_undo:"↩ Undo",
      checklist_title:"Progress",
      label_translations:"Translations",
      label_audio:"Audio",
      label_done:"Completed",
      instructions_title:"Instructions",
      instructions_body:"For each sentence: (1) Write your translation in your heritage language. (2) Record yourself saying the sentence slowly and clearly. (3) Click 'Mark done' when you finish each sentence. You can pause and come back later.",
      status_label:"Topic status",
      status_inprogress:"In progress",
      save_ok:"✓ Saved!",
      submit_ok:"✓ Submitted for review! Thank you.",
      submit_incomplete:"Please complete all translations before submitting.",
      footer_tagline:"Living languages, preserved for generations."
    }
  };

  let currentLang = localStorage.getItem('lh_lang') || 'sw';
  let topicData   = null;
  let phraseState = {}; // { phraseId: { translation, hasAudio, done } }
  let recording   = {}; // { phraseId: true/false }

  // ── LANG ──────────────────────────────────────────────
  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lh_lang', lang);
    document.getElementById('btn-sw').classList.toggle('active', lang === 'sw');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    const t = i18n[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });
    if (topicData) render();
  }

  // ── LOAD DATA ─────────────────────────────────────────
  async function init() {
    const params  = new URLSearchParams(window.location.search);
    const topicId = params.get('id') || 'pronouns';

    try {
      const res  = await fetch('../data/topics.json');
      const data = await res.json();
      topicData  = data.topics.find(t => t.id === topicId);
      if (!topicData) throw new Error('Topic not found: ' + topicId);
    } catch(e) {
      document.getElementById('mainContainer').innerHTML =
        `<div class="loading" style="color:var(--terracotta);">Hitilafu: ${e.message}</div>`;
      return;
    }

    // Init phrase state
    topicData.blocks.forEach(block => {
      block.phrases.forEach(p => {
        phraseState[p.id] = { translation:'', hasAudio:false, done:false };
      });
    });

    // Load saved draft
    loadDraft();

    // Update header
    const t = i18n[currentLang];
    document.getElementById('hdr-type').textContent =
      topicData.type === 'grammar' ? t.type_grammar : t.type_vocabulary;
    document.getElementById('hdr-title').textContent = topicData.name[currentLang];
    document.getElementById('hdr-payment-amount').textContent =
      topicData.payment_tzs.toLocaleString() + ' TZS';

    render();
  }

  // ── RENDER ────────────────────────────────────────────
  function render() {
    const t   = i18n[currentLang];
    const nk  = currentLang; // 'sw' or 'en'
    const ck  = 'ctx_' + currentLang;

    // Update dynamic i18n in header
    document.getElementById('hdr-type').textContent =
      topicData.type === 'grammar' ? t.type_grammar : t.type_vocabulary;
    document.getElementById('hdr-title').textContent = topicData.name[currentLang];

    // Count totals
    const allPhrases = topicData.blocks.flatMap(b => b.phrases);
    const total   = allPhrases.length;
    const nTrl    = allPhrases.filter(p => phraseState[p.id]?.translation).length;
    const nAud    = allPhrases.filter(p => phraseState[p.id]?.hasAudio).length;
    const nDone   = allPhrases.filter(p => phraseState[p.id]?.done).length;
    const pct     = Math.round(nDone / total * 100);

    // Build HTML
    let html = `
      <!-- STATUS PATH -->
      <div class="status-path">
        <div class="status-step current">
          <div class="status-step__dot"></div>
          ${t.status_inprogress}
        </div>
        <div class="status-arrow">›</div>
        <div class="status-step"><div class="status-step__dot"></div>${currentLang==='sw'?'Ukaguzi wa msimamizi':'Moderator review'}</div>
        <div class="status-arrow">›</div>
        <div class="status-step"><div class="status-step__dot"></div>${currentLang==='sw'?'Uamuzi wako':'Your decision'}</div>
        <div class="status-arrow">›</div>
        <div class="status-step"><div class="status-step__dot"></div>${currentLang==='sw'?'Malipo':'Payment'}</div>
      </div>

      <!-- WARNING BLOCK -->
      <div class="warning-block">
        <div class="warning-block__title">${t.warning_title}</div>
        ${['w1','w2','w3','w4','w5','w6'].map(k => `
          <div class="warning-block__item">
            <span class="warning-block__icon">•</span>
            <span>${t[k]}</span>
          </div>`).join('')}
      </div>

      <!-- MAIN GRID -->
      <div class="topic-grid" style="display:grid;grid-template-columns:1fr 280px;gap:var(--space-xl);align-items:start;">

        <!-- LEFT: phrases -->
        <div id="phraseArea">`;

    // Render each block
    let globalIdx = 1;
    topicData.blocks.forEach(block => {
      const blockPhrases   = block.phrases;
      const blockDone      = blockPhrases.filter(p => phraseState[p.id]?.done).length;
      const blockAllDone   = blockDone === blockPhrases.length;

      html += `
          <div class="block-header">
            ${block.label[nk]}
            <span class="block-progress-chip ${blockAllDone?'done':''}">${blockDone}/${blockPhrases.length}</span>
          </div>`;

      blockPhrases.forEach(phrase => {
        const state   = phraseState[phrase.id] || {};
        const isDone  = state.done;
        const isOpen  = !isDone;
        const isRec   = recording[phrase.id];
        const ctx     = phrase[ck];

        html += `
          <div class="phrase-block ${isDone?'done':''}" id="pb-${phrase.id}">
            <div class="phrase-header" onclick="togglePhrase('${phrase.id}')">
              <div class="phrase-num ${isDone?'done':''}">${isDone?'✓':globalIdx}</div>
              <div class="phrase-source">
                ${phrase[nk]}
                ${ctx ? `<span>${ctx}</span>` : ''}
              </div>
              <div class="phrase-chevron ${isOpen?'open':''}" id="chev-${phrase.id}">›</div>
            </div>
            <div class="phrase-body ${isOpen?'open':''}" id="body-${phrase.id}">

              <!-- Translation -->
              <div>
                <div class="field-label">${t.field_translation}</div>
                <input
                  type="text"
                  class="translation-input ${state.translation?'filled':''}"
                  placeholder="${t.field_translation_ph}"
                  value="${state.translation||''}"
                  oninput="onInput('${phrase.id}', this.value)"
                  id="inp-${phrase.id}"
                />
              </div>

              <!-- Audio -->
              <div>
                <div class="field-label">${t.field_audio}</div>
                <div class="audio-controls">
                  <button class="rec-btn rec-btn--record ${isRec?'recording':''}"
                    onclick="toggleRec('${phrase.id}')">
                    ${isRec?'⏹':'🎙'}
                  </button>
                  <button class="rec-btn rec-btn--play"
                    onclick="playAudio('${phrase.id}')"
                    ${!state.hasAudio?'disabled':''}>▶</button>
                  <button class="rec-btn rec-btn--delete"
                    onclick="deleteAudio('${phrase.id}')"
                    ${!state.hasAudio?'disabled':''}>🗑</button>
                  <div class="audio-status ${state.hasAudio?'has-rec':''}">
                    ${isRec ? t.audio_recording : state.hasAudio ? t.audio_saved : t.audio_tip}
                  </div>
                </div>
              </div>

              <!-- Mark done -->
              <div style="display:flex;justify-content:flex-end;">
                <button class="btn ${isDone?'btn--secondary':'btn--primary'} btn--sm"
                  onclick="markDone('${phrase.id}')">
                  ${isDone ? t.btn_undo : t.btn_done}
                </button>
              </div>

            </div>
          </div>`;

        globalIdx++;
      });
    });

    html += `
        </div>

        <!-- RIGHT: sidebar -->
        <div class="topic-sidebar" style="position:sticky;top:80px;">

          <!-- Checklist -->
          <div class="sidebar-card">
            <div class="sidebar-card__title">${t.checklist_title}</div>
            <div style="display:flex;flex-direction:column;gap:var(--space-sm);margin-bottom:var(--space-md);">
              <div style="display:flex;align-items:center;gap:var(--space-sm);">
                <div class="mini-check ${nTrl===total?'done':''}">✓</div>
                <span style="font-size:0.82rem;color:var(--text-mid);">${t.label_translations}: ${nTrl}/${total}</span>
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);">
                <div class="mini-check ${nAud===total?'done':''}">✓</div>
                <span style="font-size:0.82rem;color:var(--text-mid);">${t.label_audio}: ${nAud}/${total}</span>
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);">
                <div class="mini-check ${nDone===total?'done':''}">✓</div>
                <span style="font-size:0.82rem;color:var(--text-mid);">${t.label_done}: ${nDone}/${total}</span>
              </div>
            </div>
            <div class="flex-between" style="margin-bottom:6px;">
              <span style="font-size:0.78rem;color:var(--text-soft);">${nDone}/${total}</span>
              <span style="font-size:0.78rem;font-weight:500;color:var(--green-deep);">${pct}%</span>
            </div>
            <div class="progress"><div class="progress__fill" style="width:${pct}%;"></div></div>
          </div>

          <!-- Instructions -->
          <div class="sidebar-card">
            <div class="sidebar-card__title">${t.instructions_title}</div>
            <div style="font-size:0.82rem;color:var(--text-mid);line-height:1.75;">${t.instructions_body}</div>
          </div>

          <!-- Payment info -->
          <div class="sidebar-card" style="background:var(--green-mist);border-color:var(--green-pale);">
            <div class="sidebar-card__title" style="color:var(--green-deep);">
              ${currentLang==='sw'?'Malipo ya mada hii':'Payment for this topic'}
            </div>
            <div style="font-size:1.4rem;font-weight:600;color:var(--green-deep);margin-bottom:4px;">
              ${topicData.payment_tzs.toLocaleString()} TZS
            </div>
            <div style="font-size:0.78rem;color:var(--text-mid);">
              ${currentLang==='sw'?'Baada ya ukaguzi na uthibitisho wa msimamizi mkuu':'After review and admin confirmation'}
            </div>
          </div>

          <!-- Buttons -->
          <div style="display:flex;flex-direction:column;gap:var(--space-sm);">
            <button class="btn btn--primary w-full" style="justify-content:center;" onclick="submitTopic()" data-i18n="btn_submit">
              ${t.btn_submit}
            </button>
            <button class="btn btn--ghost w-full" style="justify-content:center;" onclick="saveDraft()" data-i18n="btn_save">
              ${t.btn_save}
            </button>
          </div>

        </div>
      </div>
      <div style="height:var(--space-2xl);"></div>`;

    document.getElementById('mainContainer').innerHTML = html;
  }

  // ── INTERACTIONS ──────────────────────────────────────
  function togglePhrase(id) {
    const body = document.getElementById('body-' + id);
    const chev = document.getElementById('chev-' + id);
    if (!body) return;
    const open = body.classList.toggle('open');
    chev.classList.toggle('open', open);
  }

  function onInput(id, value) {
    if (!phraseState[id]) phraseState[id] = {};
    phraseState[id].translation = value;
    const inp = document.getElementById('inp-' + id);
    if (inp) inp.classList.toggle('filled', !!value);
    updateChecklist();
  }

  function toggleRec(id) {
    if (recording[id]) {
      recording[id] = false;
      if (!phraseState[id]) phraseState[id] = {};
      phraseState[id].hasAudio = true;
    } else {
      recording[id] = true;
    }
    render();
  }

  function playAudio(id) {
    const msg = currentLang === 'sw'
      ? 'Kucheza sauti... (itafanya kazi na rekodi halisi)'
      : 'Playing audio... (will work with real recordings)';
    showToast(msg, 'info');
  }

  function deleteAudio(id) {
    if (!phraseState[id]) phraseState[id] = {};
    phraseState[id].hasAudio = false;
    recording[id] = false;
    render();
  }

  function markDone(id) {
    if (!phraseState[id]) phraseState[id] = {};
    phraseState[id].done = !phraseState[id].done;
    if (phraseState[id].done) {
      const body = document.getElementById('body-' + id);
      const chev = document.getElementById('chev-' + id);
      if (body) body.classList.remove('open');
      if (chev) chev.classList.remove('open');
      // Update phrase block and num without full re-render
      const pb  = document.getElementById('pb-' + id);
      const num = pb?.querySelector('.phrase-num');
      if (pb)  pb.classList.add('done');
      if (num) { num.classList.add('done'); num.textContent = '✓'; }
    } else {
      const pb  = document.getElementById('pb-' + id);
      const num = pb?.querySelector('.phrase-num');
      if (pb)  pb.classList.remove('done');
      // Re-render to restore number — just update checklist for now
    }
    updateChecklist();
  }

  // ── CHECKLIST UPDATE (without full re-render) ─────────
  function updateChecklist() {
    const allPhrases = topicData.blocks.flatMap(b => b.phrases);
    const total  = allPhrases.length;
    const nTrl   = allPhrases.filter(p => phraseState[p.id]?.translation).length;
    const nAud   = allPhrases.filter(p => phraseState[p.id]?.hasAudio).length;
    const nDone  = allPhrases.filter(p => phraseState[p.id]?.done).length;
    const pct    = Math.round(nDone / total * 100);
    const t      = i18n[currentLang];

    // Update mini checks text (find by content pattern)
    const checks = document.querySelectorAll('.mini-check');
    if (checks[0]) checks[0].classList.toggle('done', nTrl === total);
    if (checks[1]) checks[1].classList.toggle('done', nAud === total);
    if (checks[2]) checks[2].classList.toggle('done', nDone === total);

    const spans = document.querySelectorAll('.sidebar-card span[style*="text-mid"]');
    if (spans[0]) spans[0].textContent = `${t.label_translations}: ${nTrl}/${total}`;
    if (spans[1]) spans[1].textContent = `${t.label_audio}: ${nAud}/${total}`;
    if (spans[2]) spans[2].textContent = `${t.label_done}: ${nDone}/${total}`;

    const bar = document.querySelector('.progress__fill');
    if (bar) bar.style.width = pct + '%';
  }

  // ── DRAFT ─────────────────────────────────────────────
  function saveDraft() {
    try {
      localStorage.setItem('lh_draft_' + topicData.id, JSON.stringify(phraseState));
      showToast(i18n[currentLang].save_ok, 'success');
    } catch(e) { console.warn('Save failed', e); }
  }

  function loadDraft() {
    try {
      const raw = localStorage.getItem('lh_draft_' + topicData.id);
      if (raw) {
        const saved = JSON.parse(raw);
        Object.keys(saved).forEach(id => {
          if (phraseState[id] !== undefined) phraseState[id] = { ...phraseState[id], ...saved[id] };
        });
      }
    } catch(e) { console.warn('Load draft failed', e); }
  }

  function submitTopic() {
    const t = i18n[currentLang];
    const allPhrases = topicData.blocks.flatMap(b => b.phrases);
    const allTrl = allPhrases.every(p => phraseState[p.id]?.translation);
    if (!allTrl) { showToast(t.submit_incomplete, 'error'); return; }
    saveDraft();
    showToast(t.submit_ok, 'success');
    setTimeout(() => window.location.href = 'index.html', 2000);
  }

  // ── TOAST ─────────────────────────────────────────────
  function showToast(msg, type) {
    const colors = {
      success:{ bg:'var(--green-deep)', color:'var(--cream)' },
      error:  { bg:'var(--terracotta)', color:'var(--white)' },
      info:   { bg:'#1A5276',           color:'var(--white)' }
    };
    const c = colors[type] || colors.success;
    const el = document.createElement('div');
    el.textContent = msg;
    Object.assign(el.style, {
      position:'fixed', bottom:'24px', right:'24px',
      background:c.bg, color:c.color,
      padding:'12px 20px', borderRadius:'12px',
      fontSize:'0.875rem', fontFamily:'var(--font-body)',
      fontWeight:'500', boxShadow:'0 4px 16px rgba(0,0,0,0.18)',
      zIndex:'9999', opacity:'0', transform:'translateY(8px)',
      transition:'all 0.25s ease', maxWidth:'320px'
    });
    document.body.appendChild(el);
    requestAnimationFrame(() => { el.style.opacity='1'; el.style.transform='translateY(0)'; });
    setTimeout(() => { el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(() => el.remove(), 300); }, 2800);
  }

  // ── INIT ──────────────────────────────────────────────
  setLang(currentLang);
  init();
  </script>
</body>
</html>
