<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lugha Hai — Admin · Watumiaji</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .lang-switcher { display:flex;align-items:center;background:var(--cream-dark);border-radius:var(--radius-xl);padding:3px;gap:2px; }
    .lang-switcher__btn { padding:4px 12px;border-radius:var(--radius-xl);border:none;background:transparent;font-size:0.8rem;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all var(--transition); }
    .lang-switcher__btn.active { background:var(--white);color:var(--green-deep);box-shadow:0 1px 4px var(--shadow-warm); }
    .admin-layout { display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 65px); }
    .admin-sidebar { background:var(--green-deep);padding:var(--space-lg) 0;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto; }
    .admin-sidebar__section { padding:var(--space-sm) var(--space-lg);font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--green-pale);margin-top:var(--space-md); }
    .admin-nav-link { display:flex;align-items:center;gap:var(--space-md);padding:var(--space-sm) var(--space-lg);font-size:0.88rem;color:var(--green-pale);transition:all var(--transition);cursor:pointer;border-left:3px solid transparent;text-decoration:none; }
    .admin-nav-link:hover { background:rgba(255,255,255,0.06);color:var(--cream); }
    .admin-nav-link.active { background:rgba(255,255,255,0.10);color:var(--cream);border-left-color:var(--terracotta); }
    .admin-nav-link__icon { font-size:1rem;width:20px;text-align:center; }
    .admin-content { padding:var(--space-xl);background:var(--cream); }
    .admin-page-title { font-size:1.4rem;font-weight:600;color:var(--green-deep);margin-bottom:var(--space-xl); }

    /* User card */
    .user-card {
      background:var(--white);
      border:1px solid var(--cream-border);
      border-radius:var(--radius-lg);
      padding:var(--space-lg);
      box-shadow:0 2px 8px var(--shadow-warm);
      display:flex; align-items:flex-start;
      gap:var(--space-lg); flex-wrap:wrap;
      margin-bottom:var(--space-md);
      transition:all var(--transition);
    }
    .user-card:hover { box-shadow:0 6px 20px var(--shadow-deep); }
    .user-avatar {
      width:52px; height:52px; border-radius:50%;
      background:var(--green-deep); color:var(--cream);
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; font-weight:600; flex-shrink:0;
    }
    .user-card__info { flex:1; min-width:200px; }
    .user-card__name { font-weight:600; color:var(--green-deep); margin-bottom:4px; font-size:1rem; }
    .user-card__email { font-size:0.8rem; color:var(--text-muted); margin-bottom:var(--space-sm); }
    .user-card__tags { display:flex; gap:var(--space-sm); flex-wrap:wrap; }
    .user-card__stats {
      display:flex; gap:var(--space-xl); flex-shrink:0;
      align-items:center;
    }
    .user-stat { text-align:center; }
    .user-stat__value { font-size:1.1rem; font-weight:600; color:var(--green-deep); }
    .user-stat__label { font-size:0.7rem; color:var(--text-muted); }
    .user-card__actions { display:flex; gap:var(--space-sm); align-items:center; flex-shrink:0; }

    /* Quality indicator */
    .quality-bar {
      display:flex; align-items:center; gap:var(--space-sm);
    }
    .quality-dot {
      width:8px; height:8px; border-radius:50%;
    }
    .quality--high   { background:var(--green-soft); }
    .quality--medium { background:var(--gold); }
    .quality--low    { background:var(--terracotta); }

    @media(max-width:900px) {
      .admin-layout { grid-template-columns:1fr; }
      .admin-sidebar { position:static;height:auto; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container" style="max-width:100%; padding:0 var(--space-lg);">
      <div class="nav__inner">
        <a href="../index.html" class="nav__logo">Lugha <span>Hai</span></a>
        <div style="display:flex;align-items:center;gap:var(--space-md);">
          <span style="font-size:0.78rem;color:var(--text-muted);" data-i18n="admin_label">Msimamizi Mkuu</span>
          <div class="lang-switcher">
            <button class="lang-switcher__btn active" onclick="setLang('sw')" id="btn-sw">SW</button>
            <button class="lang-switcher__btn" onclick="setLang('en')" id="btn-en">EN</button>
          </div>
          <a href="../auth/login.html" class="btn btn--ghost btn--sm" data-i18n="nav_signout">Toka</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <div class="admin-sidebar">
      <div class="admin-sidebar__section" data-i18n="sidebar_overview">MUHTASARI</div>
      <a href="index.html" class="admin-nav-link"><span class="admin-nav-link__icon">📊</span><span data-i18n="nav_dashboard">Dashibodi</span></a>
      <div class="admin-sidebar__section" data-i18n="sidebar_content">MAUDHUI</div>
      <a href="languages.html" class="admin-nav-link"><span class="admin-nav-link__icon">🌍</span><span data-i18n="nav_languages">Lugha</span></a>
      <a href="users.html" class="admin-nav-link active"><span class="admin-nav-link__icon">👥</span><span data-i18n="nav_users">Watumiaji</span></a>
      <a href="disputes.html" class="admin-nav-link"><span class="admin-nav-link__icon">⚠️</span><span data-i18n="nav_disputes">Pingamizi</span></a>
      <div class="admin-sidebar__section" data-i18n="sidebar_finance">FEDHA</div>
      <a href="#" class="admin-nav-link"><span class="admin-nav-link__icon">💰</span><span data-i18n="nav_payments">Malipo</span></a>
      <div style="padding:var(--space-lg);"><a href="../index.html" style="font-size:0.78rem;color:var(--green-pale);" data-i18n="nav_view_site">← Angalia tovuti</a></div>
    </div>

    <div class="admin-content">
      <div class="flex-between mb-xl">
        <div class="admin-page-title" data-i18n="page_title">Watumiaji</div>
        <div style="display:flex;gap:var(--space-sm);">
          <select class="form-select" style="width:160px;" id="roleFilter" onchange="renderUsers()">
            <option value="" data-i18n="filter_all">Wote</option>
            <option value="contributor" data-i18n="filter_contributor">Wachangiaji</option>
            <option value="moderator" data-i18n="filter_moderator">Wasimamizi</option>
            <option value="learner" data-i18n="filter_learner">Wanafunzi</option>
          </select>
        </div>
      </div>

      <div id="usersList"></div>
    </div>
  </div>

  <script>
    const i18n = {
      sw: {
        admin_label:"Msimamizi Mkuu", nav_signout:"Toka",
        sidebar_overview:"MUHTASARI", sidebar_content:"MAUDHUI", sidebar_finance:"FEDHA",
        nav_dashboard:"Dashibodi", nav_languages:"Lugha", nav_users:"Watumiaji",
        nav_disputes:"Pingamizi", nav_payments:"Malipo", nav_view_site:"← Angalia tovuti",
        page_title:"Watumiaji",
        filter_all:"Wote", filter_contributor:"Wachangiaji",
        filter_moderator:"Wasimamizi", filter_learner:"Wanafunzi",
        role_contributor:"Mchangiaji", role_moderator:"Msimamizi", role_learner:"Mwanafunzi",
        stat_topics:"Mada", stat_quality:"Ubora", stat_earned:"TZS",
        btn_view:"Angalia", btn_suspend:"Simamisha", btn_approve:"Thibitisha",
        joined:"Alijiunga:", quality_label:"Ubora:",
      },
      en: {
        admin_label:"Admin", nav_signout:"Sign out",
        sidebar_overview:"OVERVIEW", sidebar_content:"CONTENT", sidebar_finance:"FINANCE",
        nav_dashboard:"Dashboard", nav_languages:"Languages", nav_users:"Users",
        nav_disputes:"Disputes", nav_payments:"Payments", nav_view_site:"← View site",
        page_title:"Users",
        filter_all:"All", filter_contributor:"Contributors",
        filter_moderator:"Moderators", filter_learner:"Learners",
        role_contributor:"Contributor", role_moderator:"Moderator", role_learner:"Learner",
        stat_topics:"Topics", stat_quality:"Quality", stat_earned:"TZS",
        btn_view:"View", btn_suspend:"Suspend", btn_approve:"Approve",
        joined:"Joined:", quality_label:"Quality:",
      }
    };

    let currentLang = 'sw';

    const users = [
      { name:"Priska Morara",      initials:"PM", email:"priska@example.com",
        role:"contributor", lang:"Kikurya", topics:1, quality:96, earned:5000,
        joined:"2026-04-01", status:"active" },
      { name:"Chaha Gesase",       initials:"CG", email:"chaha@example.com",
        role:"contributor", lang:"Kikurya", topics:1, quality:91, earned:4550,
        joined:"2026-04-01", status:"active" },
      { name:"Ayeke Gesase",       initials:"AG", email:"ayeke@example.com",
        role:"moderator",   lang:"Kikurya", topics:0, quality:null, earned:0,
        joined:"2026-04-01", status:"active" },
    ];

    function renderUsers() {
      const t      = i18n[currentLang];
      const filter = document.getElementById('roleFilter').value;
      const list   = filter ? users.filter(u => u.role === filter) : users;
      const roleClass = { contributor:'badge--approved', moderator:'badge--review', learner:'badge--not-started' };

      document.getElementById('usersList').innerHTML = list.map(u => {
        const qualityColor = u.quality >= 90 ? 'quality--high' : u.quality >= 70 ? 'quality--medium' : 'quality--low';
        return `
          <div class="user-card">
            <div class="user-avatar">${u.initials}</div>
            <div class="user-card__info">
              <div class="user-card__name">${u.name}</div>
              <div class="user-card__email">${u.email}</div>
              <div class="user-card__tags">
                <span class="badge ${roleClass[u.role]||'badge--not-started'}" style="font-size:0.72rem;">
                  ${t['role_'+u.role]||u.role}
                </span>
                <span class="badge badge--not-started" style="font-size:0.72rem;">${u.lang}</span>
              </div>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:var(--space-sm);">
                ${t.joined} ${u.joined}
              </div>
            </div>
            <div class="user-card__stats">
              <div class="user-stat">
                <div class="user-stat__value">${u.topics}</div>
                <div class="user-stat__label">${t.stat_topics}</div>
              </div>
              ${u.quality !== null ? `
              <div class="user-stat">
                <div class="user-stat__value">
                  <span class="quality-dot ${qualityColor}" style="display:inline-block;"></span>
                  ${u.quality}%
                </div>
                <div class="user-stat__label">${t.stat_quality}</div>
              </div>` : ''}
              <div class="user-stat">
                <div class="user-stat__value">${u.earned.toLocaleString()}</div>
                <div class="user-stat__label">${t.stat_earned}</div>
              </div>
            </div>
            <div class="user-card__actions">
              <button class="btn btn--secondary btn--sm">${t.btn_view}</button>
              <button class="btn btn--ghost btn--sm" style="color:var(--terracotta);">${t.btn_suspend}</button>
            </div>
          </div>`;
      }).join('');
    }

    function setLang(lang) {
      currentLang = lang;
      document.getElementById('btn-sw').classList.toggle('active', lang==='sw');
      document.getElementById('btn-en').classList.toggle('active', lang==='en');
      const t = i18n[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });
      renderUsers();
    }

    setLang('sw');
  </script>
</body>
</html>
